<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="container section" style="max-width:520px;">
    <div class="mainpanel">
      <h2>Register</h2>
      <input id="name" class="input" placeholder="Nama" />
      <input id="email" class="input" placeholder="Email" style="margin-top:8px;" />
      <input id="password" class="input" type="password" placeholder="Password" style="margin-top:8px;" />
      <select id="role" style="margin-top:8px;width:100%;">
        <option value="SISWA">Siswa</option>
        <option value="GURU">Guru</option>
      </select>
      <button id="registerBtn" class="btn btn-primary" style="margin-top:12px;">Daftar</button>
      <p>Sudah punya akun? <a href="login.html" class="text-link">Login</a></p>
    </div>
  </main>

  <script src="js/app.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
