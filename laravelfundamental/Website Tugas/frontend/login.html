<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="container section" style="max-width:520px;">
    <div class="mainpanel">
      <h2>Login</h2>
      <input id="email" class="input" placeholder="Email atau Username" />
      <input id="password" class="input" type="password" placeholder="Password" style="margin-top:8px;" />
      <button id="loginBtn" class="btn btn-primary" style="margin-top:12px;">Masuk</button>
      <p>Belum punya akun? <a href="register.html" class="text-link">Register</a></p>
    </div>
  </main>

  <script src="js/app.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
